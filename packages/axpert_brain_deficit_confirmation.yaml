# =====================================================================
# AXPERT BRAIN — Confirmation du déficit solaire (débounce configurable)
#
# Pas de trigger "homeassistant: event: start" : les entités template
# DÉCLENCHÉES PAR TRIGGER restaurent automatiquement leur dernier état
# confirmé au redémarrage de HA, tant qu'aucun trigger explicite ne
# vient l'écraser immédiatement. En ne recopiant jamais le signal brut
# sans délai, on évite qu'un redémarrage pendant un relevé instable
# confirme un faux déficit en quelques secondes.
# =====================================================================

template:
  - trigger:
      - trigger: state
        entity_id: binary_sensor.axpert_deficit_solaire_brut
        to: "on"
        for:
          minutes: "{{ states('sensor.debarras_maison_axpert_config_deficit_delay_on')|int(10) }}"
      - trigger: state
        entity_id: binary_sensor.axpert_deficit_solaire_brut
        to: "off"
        for:
          minutes: "{{ states('sensor.debarras_maison_axpert_config_deficit_delay_off')|int(5) }}"
    binary_sensor:
      - name: "Axpert Deficit Solaire"
        unique_id: axpert_deficit_solaire
        state: "{{ trigger.to_state.state == 'on' }}"