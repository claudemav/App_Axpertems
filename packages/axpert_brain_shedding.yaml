automation:

  - alias: "Axpert Brain — Délestage et restauration"
    id: axpert_brain_shedding
    mode: queued
    max: 5
    max_exceeded: silent

    triggers:
      - trigger: state
        entity_id: binary_sensor.axpert_deficit_solaire
        for:
          seconds: 20
      - trigger: state
        entity_id: binary_sensor.axpert_grid_down
        for:
          seconds: 20
      - trigger: time_pattern
        minutes: "/1"
      - trigger: state
        entity_id: timer.axpert_shedding_pause
        to: "idle"

    conditions:
      - condition: template
        value_template: >
          {{ ['sensor.debarras_maison_tension_reseau',
              'sensor.debarras_maison_puissance_pv',
              'sensor.debarras_maison_puissance_sortie',
              'sensor.axpert_battery_capacity_filtered',
              'binary_sensor.axpert_deficit_solaire',
              'binary_sensor.axpert_grid_down']
             | map('states')
             | select('in', ['unavailable', 'unknown', none])
             | list | length == 0 }}

    variables:
      grid_down: "{{ is_state('binary_sensor.axpert_grid_down', 'on') }}"
      grid_up: "{{ not grid_down }}"
      deficit: "{{ is_state('binary_sensor.axpert_deficit_solaire', 'on') }}"
      battery_status: "{{ states('sensor.axpert_battery_status') }}"
      battery_ok: "{{ battery_status in ['En charge', 'Repos'] }}"
      battery_capacity: "{{ states('sensor.axpert_battery_capacity_filtered')|float(0) }}"

      soc_threshold: "{{ states('sensor.debarras_maison_axpert_config_soc_threshold')|float(35) }}"

      soc_threshold_delestage: >
        {% set raw = states('sensor.debarras_maison_axpert_config_soc_threshold_delestage') %}
        {{ raw | float(soc_threshold) if raw not in ['unknown', 'unavailable', none, ''] else soc_threshold }}

      night_start_str: >
        {% set raw = states('sensor.debarras_maison_axpert_config_night_start') %}
        {{ raw if raw not in ['unknown', 'unavailable', none, ''] else '23:00' }}
      sun_below_horizon: "{{ is_state('sun.sun', 'below_horizon') }}"

      night_restore_ok: >
        {% set night_start = strptime(night_start_str, '%H:%M').time() %}
        {{ now().time() >= night_start
           or (sun_below_horizon and now().time() < strptime('12:00', '%H:%M').time()) }}
      night_restore_active: "{{ night_restore_ok and battery_capacity > soc_threshold }}"

      shed_needed: "{{ grid_down and deficit and battery_capacity < soc_threshold_delestage }}"
      restore_needed: "{{ grid_up or (not deficit and battery_ok) }}"

      # CORRIGÉ (point #7) : states('entity_id') ne renvoie JAMAIS None —
      # pour une entité inexistante il renvoie la chaîne 'unknown', donc
      # "states(progress_id) is not none" était TOUJOURS vrai, quelle que
      # soit l'existence réelle de l'entité. Le test correct passe par
      # l'accès registre states[entity_id], qui renvoie bien None si
      # l'entité n'existe pas.
      loads: >
        {% set ns = namespace(items=[]) %}
        {% for tier_num, label_id, default_delay_key, default_delay in [
             (1, 'delestage_tier1', 'sensor.debarras_maison_axpert_config_restore_delay_tier1', 180),
             (2, 'delestage_tier2', 'sensor.debarras_maison_axpert_config_restore_delay_tier2', 5),
             (3, 'delestage_tier3', 'sensor.debarras_maison_axpert_config_restore_delay_tier3', 5)
           ] %}
          {% for ent in label_entities(label_id) %}
            {% if ent.startswith('switch.') %}
              {% set delay_cfg = states(default_delay_key) %}
              {% set delay = delay_cfg | float(default_delay) if delay_cfg not in ['unknown', 'unavailable', none, ''] else default_delay %}
              {% set object_id = ent.split('.')[1] %}
              {% set progress_id = 'input_boolean.axpert_command_in_progress_' ~ object_id %}
              {% set progress_id = progress_id if states[progress_id] is not none else '' %}
              {% set ns.items = ns.items + [{
                   'entity_id': ent,
                   'tier': tier_num,
                   'restore_delay': delay,
                   'lock_entity_id': 'input_boolean.axpert_manual_lock_' ~ object_id,
                   'progress_entity_id': progress_id
              }] %}
            {% endif %}
          {% endfor %}
        {% endfor %}
        {{ ns.items }}

      tier1_all_off: >
        {% set ns = namespace(all_off=true) %}
        {% set t1 = loads | selectattr('tier', 'eq', 1) | list %}
        {% for l in t1 %}
          {% if not is_state(l.entity_id, 'off') %}{% set ns.all_off = false %}{% endif %}
        {% endfor %}
        {{ t1 | length > 0 and ns.all_off }}

      shedding_paused: "{{ is_state('timer.axpert_shedding_pause', 'active') }}"
      tier1_shed_allowed: "{{ shed_needed and not night_restore_active and not shedding_paused }}"

    actions:

      # ---------------------------------------------------------------
      # Délestage tier 1
      # ---------------------------------------------------------------
      - if:
          - condition: template
            value_template: "{{ tier1_shed_allowed }}"
        then:
          - repeat:
              for_each: "{{ loads | selectattr('tier', 'eq', 1) | list }}"
              sequence:
                - if:
                    - condition: template
                      value_template: "{{ is_state(repeat.item.entity_id, 'on') }}"
                  then:
                    - if:
                        - condition: template
                          value_template: "{{ repeat.item.progress_entity_id != '' }}"
                      then:
                        - action: input_boolean.turn_on
                          target:
                            entity_id: "{{ repeat.item.progress_entity_id }}"
                    - action: switch.turn_off
                      target:
                        entity_id: "{{ repeat.item.entity_id }}"
                    # CORRIGÉ (point #8) : délai fixe de 3s remplacé par
                    # une attente de la confirmation réelle de l'état
                    # (utile pour Tuya, plus lent qu'une prise locale) —
                    # timeout de secours à 15s si l'état ne confirme
                    # jamais (ne bloque pas indéfiniment le Brain).
                    - wait_template: "{{ is_state(repeat.item.entity_id, 'off') }}"
                      timeout: "00:00:15"
                      continue_on_timeout: true
                    - if:
                        - condition: template
                          value_template: "{{ repeat.item.progress_entity_id != '' }}"
                      then:
                        - action: input_boolean.turn_off
                          target:
                            entity_id: "{{ repeat.item.progress_entity_id }}"

      # ---------------------------------------------------------------
      # Délestage tier 2
      # ---------------------------------------------------------------
      - if:
          - condition: template
            value_template: "{{ shed_needed and deficit and tier1_all_off and not shedding_paused }}"
        then:
          - repeat:
              for_each: "{{ loads | selectattr('tier', 'eq', 2) | list }}"
              sequence:
                - if:
                    - condition: template
                      value_template: "{{ is_state(repeat.item.entity_id, 'on') }}"
                  then:
                    - if:
                        - condition: template
                          value_template: "{{ repeat.item.progress_entity_id != '' }}"
                      then:
                        - action: input_boolean.turn_on
                          target:
                            entity_id: "{{ repeat.item.progress_entity_id }}"
                    - action: switch.turn_off
                      target:
                        entity_id: "{{ repeat.item.entity_id }}"
                    - wait_template: "{{ is_state(repeat.item.entity_id, 'off') }}"
                      timeout: "00:00:15"
                      continue_on_timeout: true
                    - if:
                        - condition: template
                          value_template: "{{ repeat.item.progress_entity_id != '' }}"
                      then:
                        - action: input_boolean.turn_off
                          target:
                            entity_id: "{{ repeat.item.progress_entity_id }}"

      # ---------------------------------------------------------------
      # Délestage tier 3
      # ---------------------------------------------------------------
      - variables:
          tier2_all_off: >
            {% set ns2 = namespace(all_off=true) %}
            {% set t2 = loads | selectattr('tier', 'eq', 2) | list %}
            {% for l in t2 %}
              {% if not is_state(l.entity_id, 'off') %}{% set ns2.all_off = false %}{% endif %}
            {% endfor %}
            {{ t2 | length == 0 or ns2.all_off }}
      - if:
          - condition: template
            value_template: "{{ shed_needed and deficit and tier1_all_off and tier2_all_off and not shedding_paused }}"
        then:
          - repeat:
              for_each: "{{ loads | selectattr('tier', 'eq', 3) | list }}"
              sequence:
                - if:
                    - condition: template
                      value_template: "{{ is_state(repeat.item.entity_id, 'on') }}"
                  then:
                    - if:
                        - condition: template
                          value_template: "{{ repeat.item.progress_entity_id != '' }}"
                      then:
                        - action: input_boolean.turn_on
                          target:
                            entity_id: "{{ repeat.item.progress_entity_id }}"
                    - action: switch.turn_off
                      target:
                        entity_id: "{{ repeat.item.entity_id }}"
                    - wait_template: "{{ is_state(repeat.item.entity_id, 'off') }}"
                      timeout: "00:00:15"
                      continue_on_timeout: true
                    - if:
                        - condition: template
                          value_template: "{{ repeat.item.progress_entity_id != '' }}"
                      then:
                        - action: input_boolean.turn_off
                          target:
                            entity_id: "{{ repeat.item.progress_entity_id }}"

      # ---------------------------------------------------------------
      # Restauration réactive — la pause NE bloque PAS ceci.
      # ---------------------------------------------------------------
      - if:
          - condition: template
            value_template: "{{ restore_needed and not shed_needed }}"
        then:
          - repeat:
              for_each: "{{ loads }}"
              sequence:
                - if:
                    - condition: template
                      value_template: >
                        {{ is_state(repeat.item.entity_id, 'off')
                           and not is_state(repeat.item.lock_entity_id, 'on') }}
                  then:
                    - delay:
                        seconds: "{{ repeat.item.restore_delay }}"
                    - if:
                        - condition: template
                          value_template: >
                            {{ is_state(repeat.item.entity_id, 'off')
                               and not is_state(repeat.item.lock_entity_id, 'on')
                               and (not is_state('binary_sensor.axpert_grid_down', 'on')
                                    or not is_state('binary_sensor.axpert_deficit_solaire', 'on')) }}
                      then:
                        - if:
                            - condition: template
                              value_template: "{{ repeat.item.progress_entity_id != '' }}"
                          then:
                            - action: input_boolean.turn_on
                              target:
                                entity_id: "{{ repeat.item.progress_entity_id }}"
                        - action: switch.turn_on
                          target:
                            entity_id: "{{ repeat.item.entity_id }}"
                        - wait_template: "{{ is_state(repeat.item.entity_id, 'on') }}"
                          timeout: "00:00:15"
                          continue_on_timeout: true
                        - if:
                            - condition: template
                              value_template: "{{ repeat.item.progress_entity_id != '' }}"
                          then:
                            - action: input_boolean.turn_off
                              target:
                                entity_id: "{{ repeat.item.progress_entity_id }}"